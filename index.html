<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070B16" />

    <!-- Set theme before paint to avoid a flash. Defaults to dark. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme") || "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <title>Mahdi Kchaou — Revenue Operations &amp; Data</title>
    <meta
      name="description"
      content="Mahdi Kchaou — Revenue Operations &amp; Data practitioner. I turn messy CRM and pipeline data into a single source of truth with Salesforce, HubSpot, SQL and Power BI. Based in Nuremberg, Germany · EU work-authorized · open to remote."
    />
    <link rel="canonical" href="https://mahdi-kchaou-portfolio.vercel.app/" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Mahdi Kchaou — Revenue Operations &amp; Data" />
    <meta
      property="og:description"
      content="I turn messy CRM and pipeline data into a single source of truth. RevOps · Sales Ops · Data Analyst. Nuremberg, Germany · EU work-authorized."
    />
    <meta property="og:url" content="https://mahdi-kchaou-portfolio.vercel.app/" />
    <meta property="og:image" content="https://mahdi-kchaou-portfolio.vercel.app/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mahdi Kchaou — Revenue Operations &amp; Data" />
    <meta
      name="twitter:description"
      content="I turn messy CRM and pipeline data into a single source of truth. RevOps · Sales Ops · Data Analyst."
    />

    <!-- Fonts -->

    />

          "Friedrich-Alexander-Universität Erlangen-Nürnberg",

        ],
        "knowsAbout": [
          "Revenue Operations",
          "Salesforce",
          "HubSpot",

          "CRM data quality",
          "Sales analytics"
        ],
        "sameAs": ["https://www.linkedin.com/in/mahdi-kchaou/"]
      }

  </head>
  <body>
